name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-client:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            use-cross: false
            artifact-name: cloudsync-linux-x86_64
            build-server: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04
            use-cross: true
            artifact-name: cloudsync-linux-aarch64
          - target: x86_64-apple-darwin
            runner: macos-14
            use-cross: false
            artifact-name: cloudsync-darwin-x86_64
          - target: aarch64-apple-darwin
            runner: macos-14
            use-cross: false
            artifact-name: cloudsync-darwin-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked
      - name: Build client
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p cloudsync-client
          else
            cargo build --release --target ${{ matrix.target }} -p cloudsync-client
          fi
      - name: Build server
        if: matrix.build-server
        run: cargo build --release --target ${{ matrix.target }} -p cloudsync-server
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/${{ matrix.target }}/release/cloudsync-client
      - name: Upload server artifact
        if: matrix.build-server
        uses: actions/upload-artifact@v4
        with:
          name: cloudsync-server-linux-x86_64
          path: target/${{ matrix.target }}/release/cloudsync-server

  release:
    needs: build-client
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Rename binaries
        run: |
          for dir in artifacts/cloudsync-*; do
            name=$(basename "$dir")
            binary=$(ls "$dir")
            mv "$dir/$binary" "artifacts/$name"
            rmdir "$dir"
          done
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/cloudsync-* \
            install.sh

  deploy:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/devchris123/cloudsync-server:${{ github.ref_name }} \
                       -t ghcr.io/devchris123/cloudsync-server:latest .
          docker push ghcr.io/devchris123/cloudsync-server:${{ github.ref_name }}
          docker push ghcr.io/devchris123/cloudsync-server:latest
      - name: Deploy to server
        env:
          DEPLOY_SSH_KEY: ${{ secrets.CLOUDSYNC_HETZNER_PRIVATE_KEY }}
          CLOUDSYNC_TOKEN: ${{ secrets.CLOUDSYNC_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key docker-compose.yml root@46.224.102.7:~/docker-compose.yml
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@46.224.102.7 << EOF
            CLOUDSYNC_DOCKER_TAG=${{ github.ref_name }} \
            CLOUDSYNC_MOUNT_DIR=/mnt/volume-cloudsync/cloudsync \
            CLOUDSYNC_TOKEN=$CLOUDSYNC_TOKEN \
            docker compose -f ~/docker-compose.yml up -d
          EOF
